version: "3.9"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: rec-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: rec-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  recommendation-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rec-api
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      - ES_HOST=http://elasticsearch:9200
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models/checkpoints:/app/models/checkpoints:ro
      - ./backend/data/processed:/app/data/processed:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rec-frontend
    depends_on:
      - recommendation-api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  es_data:
  redis_data:
